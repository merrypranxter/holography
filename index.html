<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holography Shader Lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    .app-container {
      display: grid;
      grid-template-columns: 350px 1fr 350px;
      height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #0a0a0a 0%, #1a0a1a 100%);
      border-right: 2px solid #ff00ff;
      overflow-y: auto;
      padding: 20px;
    }

    .sidebar.right {
      border-left: 2px solid #00ffff;
      border-right: none;
    }

    h1 {
      font-size: 1.3em;
      color: #ff00ff;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section h2 {
      color: #00ffff;
      font-size: 0.9em;
      margin-bottom: 15px;
      text-transform: uppercase;
      border-bottom: 1px solid #00ffff33;
      padding-bottom: 5px;
    }

    .concept-card {
      background: rgba(255, 0, 255, 0.05);
      border: 1px solid #ff00ff;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .concept-card:hover {
      background: rgba(255, 0, 255, 0.15);
      border-color: #ff00ff;
      transform: translateX(5px);
    }

    .concept-card.active {
      background: linear-gradient(135deg, rgba(255, 0, 255, 0.3), rgba(0, 255, 255, 0.3));
      border-color: #fff;
    }

    .concept-name {
      font-weight: bold;
      color: #fff;
      margin-bottom: 5px;
    }

    .concept-physics {
      font-size: 0.85em;
      opacity: 0.7;
      line-height: 1.4;
    }

    .scene-card {
      background: rgba(0, 255, 255, 0.05);
      border: 1px solid #00ffff;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .scene-card:hover {
      background: rgba(0, 255, 255, 0.15);
      transform: translateX(-5px);
    }

    .scene-card.active {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(255, 0, 255, 0.3));
      border-color: #fff;
    }

    .scene-name {
      font-weight: bold;
      color: #fff;
      font-size: 0.95em;
    }

    .canvas-area {
      position: relative;
      background: #000;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #ff00ff;
      border-radius: 10px;
      padding: 20px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      margin-bottom: 15px;
      align-items: center;
    }

    .control-label {
      color: #00ffff;
      font-size: 0.85em;
    }

    .control-value {
      color: #ff00ff;
      font-weight: bold;
      min-width: 60px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      border-radius: 2px;
      outline: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    input[type="range"]:hover {
      opacity: 1;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #fff;
      border: 2px solid #ff00ff;
      border-radius: 50%;
      cursor: pointer;
    }

    .theory-panel {
      background: rgba(10, 10, 10, 0.95);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .theory-title {
      color: #ff00ff;
      font-size: 1.1em;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .theory-text {
      color: #ccc;
      font-size: 0.9em;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .math-formula {
      background: #000;
      border-left: 3px solid #00ffff;
      padding: 10px;
      margin: 10px 0;
      font-family: 'Courier New', monospace;
      color: #00ffff;
      font-size: 0.85em;
    }

    .render-law {
      background: rgba(255, 0, 255, 0.1);
      border-left: 3px solid #ff00ff;
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 0.85em;
    }

    .tag {
      display: inline-block;
      background: rgba(0, 255, 255, 0.2);
      border: 1px solid #00ffff;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75em;
      margin: 2px;
      color: #00ffff;
    }

    .preset-btn {
      background: linear-gradient(135deg, #ff00ff, #00ffff);
      border: none;
      color: #fff;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      width: 100%;
      margin-bottom: 10px;
      transition: all 0.3s;
      text-transform: uppercase;
      font-size: 0.85em;
    }

    .preset-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
    }

    .debug-modes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .debug-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #666;
      color: #ccc;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.75em;
      transition: all 0.2s;
    }

    .debug-btn.active {
      background: linear-gradient(135deg, #ff00ff, #00ffff);
      border-color: #fff;
      color: #fff;
    }

    .info-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #ff00ff;
      border-radius: 8px;
      padding: 15px;
      max-width: 400px;
      pointer-events: none;
    }

    .info-overlay h3 {
      color: #00ffff;
      margin-bottom: 8px;
      font-size: 1em;
    }

    .info-overlay p {
      color: #ccc;
      font-size: 0.85em;
      line-height: 1.4;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ff00ff, #00ffff);
      border-radius: 4px;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff00ff;
      font-size: 1.5em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar: Concepts -->
    <div class="sidebar">
      <h1>🌌 Holography Concepts</h1>
      <div class="section">
        <div id="conceptsList"></div>
      </div>
    </div>

    <!-- Center: Canvas -->
    <div class="canvas-area">
      <div class="loading" id="loading">Loading Holography Shader Lab...</div>
      <canvas id="canvas"></canvas>
      
      <div class="info-overlay" id="infoOverlay" style="display: none;">
        <h3 id="infoTitle">Scene Name</h3>
        <p id="infoDesc">Description</p>
      </div>

      <div class="controls" id="controls" style="display: none;">
        <h2 style="color: #ff00ff; margin-bottom: 15px; text-align: center;">SHADER PARAMETERS</h2>
        <div id="parameterControls"></div>
        
        <div class="debug-modes">
          <button class="debug-btn active" onclick="setDebugMode(0)">Beauty</button>
          <button class="debug-btn" onclick="setDebugMode(1)">Horizon</button>
          <button class="debug-btn" onclick="setDebugMode(2)">Stretched</button>
          <button class="debug-btn" onclick="setDebugMode(3)">Scramble</button>
          <button class="debug-btn" onclick="setDebugMode(4)">Readout</button>
          <button class="debug-btn" onclick="setDebugMode(5)">Precursor</button>
          <button class="debug-btn" onclick="setDebugMode(6)">Photon Ring</button>
        </div>
      </div>
    </div>

    <!-- Right Sidebar: Theory & Scenes -->
    <div class="sidebar right">
      <h1>📚 Theory & Scenes</h1>
      
      <div class="section">
        <h2>Current Concept</h2>
        <div id="theoryPanel" class="theory-panel">
          <div style="opacity: 0.6; text-align: center; padding: 20px;">
            Select a concept to explore
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Available Scenes</h2>
        <div id="scenesList">
          <div class="scene-card active" onclick="loadScene('horizon_hologram')">
            <div class="scene-name">🕳️ Horizon Hologram</div>
          </div>
          <div class="scene-card" onclick="loadScene('light_sheet_screen')">
            <div class="scene-name">💡 Light Sheet Screen</div>
          </div>
          <div class="scene-card" onclick="loadScene('rt_surface')">
            <div class="scene-name">🌐 RT Surface</div>
          </div>
        </div>
      </div>

      <div class="section">
        <button class="preset-btn" onclick="randomizeParams()">🎲 Randomize</button>
        <button class="preset-btn" onclick="resetParams()">↺ Reset</button>
      </div>
    </div>
  </div>

  <script>
    let canvas, gl, program;
    let concepts = [];
    let currentConcept = null;
    let currentScene = 'horizon_hologram';
    let params = {};
    let startTime = Date.now();

    // Load data
    async function init() {
      try {
        const response = await fetch('./theory/concepts.json');
        concepts = await response.json();
        renderConcepts();
        setupCanvas();
        
        // Load first concept
        loadConcept(concepts[0]);
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
      } catch (error) {
        console.error('Failed to load concepts:', error);
        document.getElementById('loading').textContent = 'Failed to load. Run a local server.';
      }
    }

    function renderConcepts() {
      const list = document.getElementById('conceptsList');
      list.innerHTML = concepts.map((concept, index) => `
        <div class="concept-card" onclick="loadConcept(concepts[${index}])" id="concept-${concept.id}">
          <div class="concept-name">${concept.name}</div>
          <div class="concept-physics">${concept.physics_meaning}</div>
        </div>
      `).join('');
    }

    function loadConcept(concept) {
      currentConcept = concept;
      
      // Update active state
      document.querySelectorAll('.concept-card').forEach(el => el.classList.remove('active'));
      document.getElementById('concept-' + concept.id).classList.add('active');
      
      // Render theory panel
      const panel = document.getElementById('theoryPanel');
      panel.innerHTML = `
        <div class="theory-title">${concept.name}</div>
        <div class="theory-text">${concept.physics_meaning}</div>
        
        ${concept.math_forms ? `
          <div style="margin: 15px 0;">
            <strong style="color: #00ffff;">Mathematics:</strong>
            ${concept.math_forms.map(formula => 
              `<div class="math-formula">${formula}</div>`
            ).join('')}
          </div>
        ` : ''}
        
        ${concept.render_laws ? `
          <div style="margin: 15px 0;">
            <strong style="color: #ff00ff;">Rendering Laws:</strong>
            ${concept.render_laws.map(law => 
              `<div class="render-law">→ ${law}</div>`
            ).join('')}
          </div>
        ` : ''}
        
        ${concept.parameters ? `
          <div style="margin: 15px 0;">
            <strong style="color: #00ffff;">Parameters:</strong><br>
            ${concept.parameters.map(param => 
              `<span class="tag">${param}</span>`
            ).join('')}
          </div>
        ` : ''}
      `;
      
      // Update info overlay
      document.getElementById('infoOverlay').style.display = 'block';
      document.getElementById('infoTitle').textContent = concept.name;
      document.getElementById('infoDesc').textContent = concept.physics_meaning;
      
      // Load default parameters
      if (concept.parameters) {
        updateControls(concept.parameters);
      }
    }

    function updateControls(parameterNames) {
      const container = document.getElementById('parameterControls');
      container.innerHTML = parameterNames.map(param => {
        const value = params[param] !== undefined ? params[param] : 1.0;
        return `
          <div class="control-row">
            <div>
              <div class="control-label">${param.replace(/([A-Z])/g, ' $1').trim()}</div>
              <input type="range" 
                     id="param-${param}" 
                     min="0" 
                     max="2" 
                     step="0.01" 
                     value="${value}"
                     oninput="updateParam('${param}', this.value)">
            </div>
            <div class="control-value" id="value-${param}">${value.toFixed(2)}</div>
          </div>
        `;
      }).join('');
    }

    function updateParam(name, value) {
      params[name] = parseFloat(value);
      document.getElementById('value-' + name).textContent = parseFloat(value).toFixed(2);
    }

    function setupCanvas() {
      canvas = document.getElementById('canvas');
      gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
      
      if (!gl) {
        alert('WebGL not supported');
        return;
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      // Start with a simple shader
      loadDefaultShader();
    }

    function resizeCanvas() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      if (gl) {
        gl.viewport(0, 0, canvas.width, canvas.height);
      }
    }

    function loadDefaultShader() {
      const vertexSource = `
        attribute vec4 a_position;
        void main() {
          gl_Position = a_position;
        }
      `;

      const fragmentSource = `
        precision highp float;
        uniform vec2 u_resolution;
        uniform float u_time;
        
        void main() {
          vec2 uv = gl_FragCoord.xy / u_resolution;
          vec2 p = (uv - 0.5) * 2.0;
          
          float r = length(p);
          float a = atan(p.y, p.x);
          
          // Holographic interference pattern
          float t = u_time * 0.3;
          float rings = sin(r * 20.0 - t * 2.0) * 0.5 + 0.5;
          float spiral = sin(a * 8.0 + r * 10.0 - t) * 0.5 + 0.5;
          
          vec3 col = vec3(
            rings * 0.5 + spiral * 0.5,
            spiral,
            rings
          );
          
          // Radial fade
          col *= smoothstep(1.5, 0.0, r);
          
          gl_FragColor = vec4(col, 1.0);
        }
      `;

      compileShader(vertexSource, fragmentSource);
      render();
    }

    function compileShader(vertexSource, fragmentSource) {
      const vertexShader = createShader(gl.VERTEX_SHADER, vertexSource);
      const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentSource);

      if (!vertexShader || !fragmentShader) return;

      if (program) gl.deleteProgram(program);
      
      program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);

      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Link failed:', gl.getProgramInfoLog(program));
        return;
      }

      gl.useProgram(program);

      const positionBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
        -1, -1, 1, -1, -1, 1, 1, 1
      ]), gl.STATIC_DRAW);

      const positionLoc = gl.getAttribLocation(program, 'a_position');
      gl.enableVertexAttribArray(positionLoc);
      gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);
    }

    function createShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);

      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }

      return shader;
    }

    function render() {
      const time = (Date.now() - startTime) / 1000.0;

      const resolutionLoc = gl.getUniformLocation(program, 'u_resolution');
      const timeLoc = gl.getUniformLocation(program, 'u_time');

      if (resolutionLoc) gl.uniform2f(resolutionLoc, canvas.width, canvas.height);
      if (timeLoc) gl.uniform1f(timeLoc, time);

      // Update parameter uniforms
      Object.entries(params).forEach(([name, value]) => {
        const loc = gl.getUniformLocation(program, 'u' + name.charAt(0).toUpperCase() + name.slice(1));
        if (loc) gl.uniform1f(loc, value);
      });

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }

    function loadScene(sceneName) {
      currentScene = sceneName;
      document.querySelectorAll('.scene-card').forEach(el => el.classList.remove('active'));
      event.target.closest('.scene-card').classList.add('active');
      console.log('Loading scene:', sceneName);
      // TODO: Load actual scene shader
    }

    function setDebugMode(mode) {
      document.querySelectorAll('.debug-btn').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      // TODO: Update shader debug mode
    }

    function randomizeParams() {
      Object.keys(params).forEach(key => {
        params[key] = Math.random() * 2;
        const slider = document.getElementById('param-' + key);
        if (slider) {
          slider.value = params[key];
          document.getElementById('value-' + key).textContent = params[key].toFixed(2);
        }
      });
    }

    function resetParams() {
      Object.keys(params).forEach(key => {
        params[key] = 1.0;
        const slider = document.getElementById('param-' + key);
        if (slider) {
          slider.value = 1.0;
          document.getElementById('value-' + key).textContent = '1.00';
        }
      });
    }

    init();
  </script>
</body>
</html>
